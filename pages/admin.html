<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>難找的聯賽 - 管理後台</title>
    
    <!-- 外部 CSS 檔案 -->
    <link rel="stylesheet" href="styles/admin.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-mode">
    <!-- 登入頁面 -->
    <div class="login-container" id="loginContainer">
        <div class="header">
            <h1>難找的聯賽</h1>
            <p>比賽管理系統</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">帳號</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary login-btn">登入</button>
            
            <div class="error-message" id="errorMessage">
                帳號或密碼錯誤！
            </div>
        </form>
    </div>

    <!-- 管理後台 -->
    <div class="admin-dashboard" id="adminDashboard">
        <div class="admin-header">
            <h1>比賽統計系統</h1>
            <button class="btn btn-secondary logout-btn" onclick="logout()">登出</button>
        </div>
        
        <!-- 功能按鈕列 -->
        <div class="function-nav">
            <button class="fn-btn fn-btn-add" id="btnAddPlayer" onclick="openAddPlayerPanel()">➕ 新增隊員</button>
            <button class="fn-btn fn-btn-match" onclick="scrollToGameSelector()">🎯 比賽登錄</button>
        </div>

        <div class="admin-content">
            <!-- 比賽選擇區域 -->
            <div class="game-selector" id="gameSelectorSection">
                <h2>選擇比賽</h2>
                <div class="form-group">
                    <select class="game-select" id="gameSelect">
                        <option value="">請選擇比賽...</option>
                    </select>
                </div>
                <div class="loading" id="loadingGames">載入比賽資料中...</div>
            </div>
            
            <!-- 比賽詳情區域 -->
            <div class="game-details" id="gameDetails">
                <!-- 新的遊戲佈局 -->
                <div class="game-board">
                    <div class="game-board-header">
                        <div class="header-cell">SET</div>
                        <div class="header-cell">主場</div>
                        <div class="header-cell">客場</div>
                        <div class="header-cell">先攻</div>
                        <div class="header-cell">勝負</div>
                    </div>
                    <div class="game-board-body">
                        <div id="gameRows">
                            <!-- SET行將動態生成 -->
                        </div>
                    </div>
                </div>
                
                <!-- 飲酒加成 -->
                <div class="bonus-simple">
                    <h3>🍺 飲酒加成 (+5分)</h3>
                    <div class="bonus-buttons">
                        <button class="bonus-btn" data-team="home" onclick="selectBonus('home')" id="homeBonusBtn">
                            主場隊伍
                        </button>
                        <button class="bonus-btn" data-team="away" onclick="selectBonus('away')" id="awayBonusBtn">
                            客場隊伍
                        </button>
                    </div>
                </div>
                
                <!-- 比賽成績試算 -->
                <div class="score-calculation">
                    <h3>比賽成績</h3>
                    <div class="score-summary">
                        <div class="score-row">
                            <div class="team-info">
                                <span class="team-name home-team" id="homeTeamScoreName">主場隊伍</span>
                                <span class="score-detail">比賽成績: <span id="homeOriginalScore">0</span></span>
                                <span class="score-detail">勝方加分: <span id="homeWinBonus">0</span></span>
                                <span class="score-detail">飲酒加成: <span id="homeDrinkBonus">0</span></span>
                                <span class="total-score home-total">總分: <span id="homeTotalScore">0</span></span>
                            </div>
                            <div class="vs-divider">VS</div>
                            <div class="team-info">
                                <span class="team-name away-team" id="awayTeamScoreName">客場隊伍</span>
                                <span class="score-detail">比賽成績: <span id="awayOriginalScore">0</span></span>
                                <span class="score-detail">勝方加分: <span id="awayWinBonus">0</span></span>
                                <span class="score-detail">飲酒加成: <span id="awayDrinkBonus">0</span></span>
                                <span class="total-score away-total">總分: <span id="awayTotalScore">0</span></span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按鈕區域 -->
                <div class="save-section">
                    <!-- 開發用自動填寫功能 (生產環境已隱藏) -->
                    <!-- <button class="preview-btn" onclick="autoFillTestData()">🎲 自動填入測試資料</button> -->
                    <button class="preview-btn" onclick="showGamePreview()">預覽比賽</button>
                    <button class="save-btn" onclick="saveGameData()">保存比賽</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增隊員面板 -->
    <div class="add-player-overlay" id="addPlayerOverlay" onclick="closeAddPlayerPanel(event)">
        <div class="add-player-panel" id="addPlayerPanel">
            <div class="add-player-header">
                <h2>➕ 新增隊員</h2>
                <button class="add-player-close" onclick="closeAddPlayerPanel(null, true)">✕</button>
            </div>
            <div class="add-player-body">
                <div class="form-group">
                    <label for="teamSelect">選擇隊伍</label>
                    <select id="teamSelect" class="add-player-select">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newPlayerName">新隊員姓名</label>
                    <input type="text" id="newPlayerName" class="add-player-input" placeholder="輸入姓名..." maxlength="20">
                </div>
                <div class="add-player-footer">
                    <button class="add-player-submit" id="addPlayerSubmit" onclick="submitAddPlayer()">送出</button>
                    <button class="add-player-cancel" onclick="closeAddPlayerPanel(null, true)">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 選手選擇彈窗 -->
    <div class="modal" id="playerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">選擇選手</h3>
                <p class="modal-subtitle" id="modalSubtitle">SET1 - 501 (OI/MO)</p>
            </div>
            <div class="modal-body">
                <div class="player-list" id="playerList">
                    <!-- 選手列表將動態生成 -->
                </div>
            </div>
        </div>
    </div>



    <!-- 引入外部 JavaScript 模組 -->
    <script src="../js/admin-sheets-api.js"></script>
    <script src="../js/admin-ui.js"></script>
    <script src="../js/preview_generator.js"></script>
    <script src="../js/github-api.js"></script>
    
    <!-- 主要業務邏輯 -->
    <script src="../js/admin-main.js"></script>

    <!-- 新增隊員功能 -->
    <script>
    // ===== 新增隊員功能 =====

    let playerJsonData = null; // 快取的 player.json

    /** 判斷是否在開放時段 (週四 00:00 ~ 週日 23:59) */
    function isAddPlayerAllowed() {
        const now = new Date();
        const day = now.getDay(); // 0=日,1=月,2=火,3=水,4=木,5=金,6=六
        // 週四(4)、週五(5)、週六(6)、週日(0) 開放；週一(1)~週三(3) 比賽期間關閉
        return day === 0 || day >= 4;
    }

    /** 開啟新增隊員面板 */
    async function openAddPlayerPanel() {
        if (!isAddPlayerAllowed()) {
            alert('⛔ 新增隊員功能僅在每週四 00:00 至週日 23:59 開放。\n比賽期間（週一、週二、週三）暫停開放，請於賽後再行新增。');
            return;
        }
        // 載入 player.json
        try {
            const res = await fetch('../data/player.json?_=' + Date.now());
            playerJsonData = await res.json();
            // 填入隊伍選單
            const sel = document.getElementById('teamSelect');
            sel.innerHTML = '<option value="">請選擇隊伍...</option>';
            Object.keys(playerJsonData).forEach(team => {
                const opt = document.createElement('option');
                opt.value = team;
                opt.textContent = team + '（' + playerJsonData[team].length + ' 人）';
                sel.appendChild(opt);
            });
        } catch (e) {
            alert('❌ 無法載入選手資料，請稍後再試。');
            return;
        }
        document.getElementById('newPlayerName').value = '';
        document.getElementById('addPlayerOverlay').style.display = 'flex';
        setTimeout(() => document.getElementById('addPlayerPanel').classList.add('open'), 10);
    }

    /** 關閉面板 */
    function closeAddPlayerPanel(event, force) {
        if (!force && event && event.target !== document.getElementById('addPlayerOverlay')) return;
        document.getElementById('addPlayerPanel').classList.remove('open');
        setTimeout(() => { document.getElementById('addPlayerOverlay').style.display = 'none'; }, 300);
    }

    /** 送出新增隊員 */
    async function submitAddPlayer() {
        const team = document.getElementById('teamSelect').value;
        const name = document.getElementById('newPlayerName').value.trim();

        if (!team) { alert('請先選擇隊伍！'); return; }
        if (!name) { alert('請輸入姓名！'); return; }

        // 全隊伍重複檢查
        const allNames = Object.values(playerJsonData).flat();
        if (allNames.includes(name)) {
            const existingTeam = Object.entries(playerJsonData).find(([t, members]) => members.includes(name))?.[0];
            alert(`⚠️ 已有同名隊員「${name}」（所屬：${existingTeam}），請確認姓名後重新輸入。`);
            document.getElementById('newPlayerName').focus();
            return;
        }

        // 更新本地資料
        playerJsonData[team].push(name);
        const newJson = JSON.stringify(playerJsonData, null, 2);

        // 透過 GAS 寫回 GitHub
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwJ3xPlfON7pkmeVKzpQImQhnlzpMz6Fn4Z1E7PwXVBZBvlncA7VCQ3tITyq9x8puAu/exec';
        const btn = document.getElementById('addPlayerSubmit');
        btn.textContent = '送出中...';
        btn.disabled = true;

        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    action: 'uploadToGitHub',
                    filePath: 'data/player.json',
                    content: newJson,
                    commitMessage: `➕ 新增選手 ${name} 至 ${team}`
                })
            });
            const text = await res.text();
            let result;
            try { result = JSON.parse(text); } catch(e) { result = {}; }

            if (result.status === 'success') {
                alert(`✅ 成功將「${name}」加入「${team}」！`);
                closeAddPlayerPanel(null, true);
            } else {
                alert(`❌ 寫入失敗：${result.message || '請稍後再試'}`);
                playerJsonData[team].pop(); // rollback
            }
        } catch (e) {
            alert('❌ 網路錯誤，請稍後再試。');
            playerJsonData[team].pop();
        } finally {
            btn.textContent = '送出';
            btn.disabled = false;
        }
    }

    /** 捲動到比賽登錄區域 */
    function scrollToGameSelector() {
        const el = document.getElementById('gameSelectorSection');
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    /** 登入後更新按鈕狀態 */
    document.addEventListener('DOMContentLoaded', function() {
        // 等 admin-main.js 完成後再更新按鈕，用 MutationObserver 監控 dashboard 顯示
        const dashboard = document.getElementById('adminDashboard');
        if (!dashboard) return;
        const observer = new MutationObserver(() => {
            updateAddPlayerBtn();
        });
        observer.observe(dashboard, { attributes: true, attributeFilter: ['style'] });
    });

    function updateAddPlayerBtn() {
        const btn = document.getElementById('btnAddPlayer');
        if (!btn) return;
        if (!isAddPlayerAllowed()) {
            btn.classList.add('fn-btn-disabled');
            btn.title = '僅週四至週日開放';
        } else {
            btn.classList.remove('fn-btn-disabled');
            btn.title = '';
        }
    }
    updateAddPlayerBtn(); // 初始執行
    </script>
</body>
</html>
