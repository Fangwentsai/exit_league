<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/schedule.css">
</head>
<body>
    <div class="container">
        <!-- 搜尋區域 -->
        <div class="search-section">
            <div class="search-title">快速篩選隊伍(可複選)</div>
            <div class="team-filters">
                <div class="filter-row">
                    <button class="team-btn" data-team="逃生入口A">逃生入口A</button>
                    <button class="team-btn" data-team="逃生入口B">逃生入口B</button>
                    <button class="team-btn" data-team="逃生入口C">逃生入口C</button>
                    <button class="team-btn" data-team="VIVI朝九晚五">VIVI朝九晚五</button>
                </div>
                <div class="filter-row">
                    <button class="team-btn" data-team="海盜揪硬">海盜揪硬</button>
                    <button class="team-btn" data-team="人生揪難">人生揪難</button>
                    <button class="team-btn" data-team="JACK都說隊">JACK都說隊</button>
                    <button class="team-btn" data-team="醉販">醉販</button>
                    <button class="cancel-btn" id="cancelBtn">取消</button>
                </div>
            </div>
        </div>

        <!-- 賽程表格 -->
        <table class="schedule-table" id="leagueTable"></table>
    </div>

    <script src="../js/schedule.js"></script>
</body>
</html>
