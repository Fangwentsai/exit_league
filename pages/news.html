<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/news.css">
</head>
<body>
    <div class="container">
        <!-- 近期比賽區塊 (置頂) -->
        <div class="upcoming-matches">
            <h2 class="section-title">近期比賽</h2>
            <div id="upcomingMatchesContent"></div>
        </div>
        
        <!-- 新聞區塊 -->
        <div class="news-content" id="newsContent">
            <!-- 阿淦幣新聞 -->
            <div class="news-item">
                <div class="news-date">2024/10/15</div>
                <div class="news-title">阿淦幣即日起開始發售</div>
                <div class="news-text">
                    <p>第二屆阿淦因其優異的手氣榮獲地獄倒霉鬼殊榮，即日起凡於比賽店家持100元阿淦幣消費即可換取一杯shot。</p>
                    <img src="../images/agan.png" alt="阿淦幣" class="news-image">
                </div>
            </div>

            <!-- 原有的新聞 -->
            <div class="news-item">
                <div class="news-date">2023/11/1</div>
                <div class="news-title">聯賽開始</div>
                <div class="news-text">難找的聯賽第三季正式開始！</div>
            </div>
        </div>
    </div>

    <script src="../js/news.js"></script>
</body>
</html>
